name: sahayakai
description: AI-Powered Government Scheme Navigator.
version: 1.1.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # AI
  google_generative_ai: ^0.4.0

  # Navigation
  go_router: ^14.2.7

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.10
  firebase_messaging: ^15.2.10

  # State Management
  provider: ^6.1.2

  # Maps & Location
  google_maps_flutter: ^2.6.0
  geolocator: ^11.0.0

  # Networking
  http: ^1.2.0

  # Config
  flutter_dotenv: ^6.0.0

  # Fonts & UI
  google_fonts: ^6.2.1
  animations: ^2.0.1

  # Intl
  intl: ^0.19.0

  # Persistence
  shared_preferences: ^2.3.0

  # Voice Input
  speech_to_text: ^6.6.0

  # URL Launcher
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/
    - assets/images/
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
    - family: PublicSans
      fonts:
        - asset: assets/fonts/PublicSans-Regular.ttf