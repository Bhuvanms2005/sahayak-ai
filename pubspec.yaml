name: sahayakai
description: AI-Powered Government Scheme Navigator.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_generative_ai: ^0.4.0
  go_router: ^14.2.7
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  provider: ^6.1.2
  google_maps_flutter: ^2.6.0
  geolocator: ^11.0.0
  http: ^1.2.0
  flutter_dotenv: ^6.0.0
  google_fonts: ^6.2.1
  animations: ^2.0.1
  intl: ^0.19.0
  shared_preferences: ^2.3.0
  firebase_storage: ^12.4.10
  firebase_messaging: ^15.2.10
  speech_to_text: ^6.6.0
  url_launcher: ^6.3.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/
    - assets/images/
